<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Покрытие конфигурации автотестами</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="sheet">

    <header class="titleblock">
      <h1 class="titleblock__title">Покрытие конфигурации автотестами</h1>
      <p class="titleblock__subtitle">Сопоставление объектов конфигурации со сценариями .feature</p>
    </header>

    <section class="controls" aria-label="Параметры анализа">

      <div class="controls__row">

        <button type="button" id="pickFolderBtn" class="path-field">
          <svg class="path-field__icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path d="M3 6.5C3 5.67 3.67 5 4.5 5h4.13c.36 0 .7.14.96.38l1.2 1.12H19.5c.83 0 1.5.67 1.5 1.5v9.5c0 .83-.67 1.5-1.5 1.5h-15C3.67 19 3 18.33 3 17.5v-11z" fill="none" stroke="currentColor" stroke-width="1.4"/>
          </svg>
          <span id="pathText" class="path-field__text">Выбрать папку репозитория&hellip;</span>
        </button>

        <button type="button" id="analyzeBtn" class="run-btn" disabled>Анализировать</button>

        <label class="checkbox">
          <input type="checkbox" id="includeSmoke" checked>
          <span class="checkbox__box" aria-hidden="true"></span>
          <span class="checkbox__label">Включать дымовые</span>
        </label>

        <label class="checkbox">
          <input type="checkbox" id="hideUncovered">
          <span class="checkbox__box" aria-hidden="true"></span>
          <span class="checkbox__label">Скрывать непокрытые</span>
        </label>

        <input type="file" id="folderInput" webkitdirectory directory multiple hidden>

      </div>

    </section>

    <section id="status" class="status" role="status" aria-live="polite"></section>

    <section class="results">
      <div id="statsContainer" class="stats"></div>
      <div id="treeContainer" class="tree-container"></div>
    </section>

  </div>

<script src="script.js"></script>
</body>
</html>
